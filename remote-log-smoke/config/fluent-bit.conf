[SERVICE]
    Flush        1
    Daemon       Off
    Parsers_File /atakit-portal/measured-data/config/fluent-bit-parsers.conf

[INPUT]
    Name              tail
    Path              /atakit-portal/workload-logs/*/*.log
    Tag               remote_log.*
    Parser            k8s_file
    Path_Key          log_path
    Read_from_Head    true
    Refresh_Interval  1
    Rotate_Wait       5
    Mem_Buf_Limit     5MB
    Skip_Long_Lines   On

[FILTER]
    Name         parser
    Match        remote_log.*
    Key_Name     message
    Parser       producer_json
    Reserve_Data On
    Preserve_Key On

[FILTER]
    Name   record_modifier
    Match  remote_log.*
    Record run_id ${LOG_RUN_ID}
    Record example remote-log-smoke

[OUTPUT]
    Name        http
    Match       remote_log.*
    Host        ${LOG_RECEIVER_HOST}
    Port        ${LOG_RECEIVER_PORT}
    URI         /ingest
    Format      json_lines
    Header      Content-Type application/x-ndjson
    Retry_Limit False
